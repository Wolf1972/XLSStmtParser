cmd.i=*Имя каталога или файла для обработки, обязательно
cmd.o=*Имя каталога или файла с результатами, обязательно
cmd.a=Имя каталога для архивации исходных файлов (если не указан, без архивации)
cmd.s=Тип файла выписки ("BTB"-выписка банка BTB, по умолчанию)
cmd.l=Символы разделителя строк: "r", "n" или "rn" (системный разделитель по умолчанию)
cmd.f=Символ разделитель полей: ",", ";" (";" по умолчанию)
cmd.n=Символ разделитель дробной части: ".", "," (системный разделитель по умолчанию)
cmd.c=Кодировка файла с результатами: UTF-8, ISO-8859-5, KOI8-R, IBM866, windows-1251 (UTF-8 по умолчанию)
cmd.x=Тип файла Excel: AUTO - автоопределение, XLS - старый формат, XLSX - новый формат (AUTO по умолчанию)
cmd.d=Формат даты (YYYY-MM-DD по умолчанию)
cmd.p=Поведение при ошибках: ALL - останавливать разбор при любой ошибке, FORMAT - останавливать разбор только при ошибке формата, NONE - продолжать разбор при любой ошибке
cmd.e=Уровень логирования (DEBUG, TRACE, INFO, WARNING, ERROR), INFO by default

