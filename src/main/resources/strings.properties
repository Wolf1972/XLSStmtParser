cmd.i=* Input XLS file or directory, required
cmd.o=* Output CVS file or directory, required
cmd.a=Archive file or directory, no archivation by default
cmd.s=Statement type (BTB - BTB Bank), BTB by default
cmd.l=Line separator ("n" or "rn"), system separator by default
cmd.f=Field separator, ";" by default
cmd.n=Numeric separator, "." or ",", system separator by default
cmd.c=Output file in specified code page: UTF-8, ISO-8859-5, KOI8-R, IBM866, windows-1251, UTF-8 by default
cmd.x=XLS file type (AUTO - auto defining, XLS only, XLSX only), AUTO by default
cmd.d=Output date format, YYYY-MM-DD by default
cmd.p=Process termination (when error leads to fail operation): ALL - fail when any error, FORMAT - fail when only format errors (before parsing), NONE - try not to fail when any error
cmd.e=Log level (DEBUG, TRACE, INFO, WARNING, ERROR), INFO by default

